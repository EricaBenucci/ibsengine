<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home - Italian Beer School</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand&display=swap" rel="stylesheet" />
    <style>
        /* ---------------------- */
        /* Base pagina e sfondo   */
        /* ---------------------- */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Quicksand', sans-serif;
            background: url('sfondobichiere.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            overflow-x: hidden;
        }
        a { text-decoration: none; color: inherit; }
        
        .overlay {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-color: rgba(0, 0, 0, 0.6);
        }

        /* ---------------------- */
        /* Header / Navbar        */
        /* ---------------------- */
        header {
            display: flex;
            align-items: center;
            background-color: rgba(0, 0, 0, 0.8);
            padding: 15px 20px; /* Banda stretta richiesta */
            position: relative;
            z-index: 10;
            height: 60px;
        }

        /* Centratura Logo Perfetta */
        .logo-container {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }
        .logo-container img {
            height: 70px;
            display: block;
        }

        .hamburger-menu {
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 5px;
            padding: 0;
            z-index: 11;
        }
        .hamburger-menu .line {
            width: 25px;
            height: 3px;
            background-color: #fff;
            border-radius: 2px;
        }

        /* ---------------------- */
        /* Menu Laterale          */
        /* ---------------------- */
        .menu-pop-up {
            position: fixed;
            top: 0;
            left: -300px;
            width: 260px;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            padding-top: 60px;
            transition: 0.3s;
            z-index: 20;
        }
        .menu-pop-up.open { left: 0; }
        .menu-pop-up a {
            padding: 15px 25px;
            display: block;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 1.1em;
        }
        .close-menu {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 2em;
            cursor: pointer;
        }

        /* ---------------------- */
        /* Griglia Eventi         */
        /* ---------------------- */
        .content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }
        .event-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            justify-content: center;
            max-width: 1000px;
        }
        .event-box {
            flex: 1;
            min-width: 250px;
            max-width: 350px;
            text-align: center;
        }
        /* Immagini pulite senza bordi gialli */
        .event-box img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border-radius: 50%;
            border: none; 
            box-shadow: none;
            transition: 0.3s;
        }
        .event-box a:hover img { transform: scale(1.03); }
        .event-title {
            font-size: 1.6em;
            font-weight: bold;
            margin-top: 15px;
            color: #fff;
        }
        .event-date {
            font-size: 1.1em;
            margin-top: 5px;
            opacity: 0.9;
        }

        /* ---------------------- */
        /* Footer                 */
        /* ---------------------- */
        .footer {
            background-color: rgba(0, 0, 0, 0.8);
            text-align: center;
            padding: 20px;
            font-size: 0.8em;
            border-top: none; /* Rimosse righine */
        }

        /* ---------------------- */
        /* Cookie Banner Corretto */
        /* ---------------------- */
        #cookie-banner {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background: #fff;
            color: #000;
            padding: 20px;
            border-radius: 10px;
            z-index: 1000;
            display: none; /* Gestito da JS */
            flex-direction: column;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .cookie-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .cookie-buttons button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        #accept-cookies { background: #28a745; color: #fff; }
        #reject-cookies { background: #dc3545; color: #fff; }
    </style>
</head>
<body>
    <div class="overlay">
        <header>
            <button class="hamburger-menu" onclick="toggleMenu()">
                <div class="line"></div>
                <div class="line"></div>
                <div class="line"></div>
            </button>
            <div class="logo-container">
                <a href="index.html">
                    <img src="logonew.png" alt="Logo IBS" />
                </a>
            </div>
        </header>

        <nav class="menu-pop-up" id="side-menu">
            <div class="close-menu" onclick="toggleMenu()">&times;</div>
            <a href="index.html">HOME</a>
            <a href="bio.html">CHI SONO</a>
            <a href="prossimieventi.html">PROSSIMI EVENTI</a>
            <a href="losapeviche.html">LO SAPEVI CHE?</a>
            <a href="corsodibirra.html">CORSO DI BIRRA</a>
            <a href="contatti.html">CONTATTI</a>
        </nav>

        <main class="content">
            <div class="event-grid">
                <div class="event-box">
                    <a href="iga.html"> 
                        <img src="iga.jpg" alt="IGA" />
                        <div class="event-title">IGA ITALIAN GRAPE ALE</div>
                        <div class="event-date">10 giugno</div>
                    </a>
                </div>
                <div class="event-box">
                    <a href="corsodibirra.html">
                        <img src="corsohome.jpg" alt="Corso" />
                        <div class="event-title">CORSO DI BIRRA</div>
                        <div class="event-date">Ottobre 2026</div>
                    </a>
                </div>
            </div>
        </main>

        <footer class="footer">
            © 2025 IBS ITALIAN BEER SCHOOL – P.IVA: IT07436420488 | <a href="privacy.html">Privacy</a>
        </footer>
    </div>

    <div id="cookie-banner">
        <p style="margin:0; font-size: 0.9em;">Utilizziamo i cookie per migliorare la tua esperienza. Accetti?</p>
        <div class="cookie-buttons">
            <button id="accept-cookies">Accetta</button>
            <button id="reject-cookies">Rifiuta</button>
        </div>
    </div>

    <script>
        // Menu Toggle
        function toggleMenu() {
            document.getElementById('side-menu').classList.toggle('open');
        }

        // Gestione Cookie (Fix persistenza)
        const banner = document.getElementById('cookie-banner');
        const acceptBtn = document.getElementById('accept-cookies');
        const rejectBtn = document.getElementById('reject-cookies');

        window.onload = function() {
            // Controlla se l'utente ha già espresso una preferenza
            if (!localStorage.getItem('cookie_accepted')) {
                banner.style.display = 'flex';
            }
        };

        acceptBtn.onclick = function() {
            localStorage.setItem('cookie_accepted', 'true');
            banner.style.display = 'none';
        };

        rejectBtn.onclick = function() {
            localStorage.setItem('cookie_accepted', 'false');
            banner.style.display = 'none';
        };
    </script>
</body>
</html>
