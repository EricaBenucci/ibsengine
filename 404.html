<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Schiuma... ops! Pagina non trovata - Italian Beer School</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        /* RESET E STILI BASE */
        html, body {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Quicksand', sans-serif;
            color: #fff; overflow-x: hidden;
        }
        
        /* SFONDO RICHIESTO CON SCHIUMA */
        body {
            background: url('bicchiere-schiuma-foam.webp') no-repeat center center fixed;
            background-size: cover;
        }

        a { text-decoration: none; color: inherit; transition: opacity 0.3s; }
        a:hover { opacity: 0.9; }

        /* OVERLAY SCURO PER LEGGIBILITÀ */
        .overlay {
            display: flex; flex-direction: column; min-height: 100vh;
            background-color: rgba(0, 0, 0, 0.65); /* Overlay leggermente più scuro per i testi */
            position: relative; z-index: 1;
        }

        /* HEADER (Uniformato a index.html) */
        header {
            display: flex; justify-content: space-between; align-items: center;
            background-color: rgba(0, 0, 0, 0.8); padding: 25px 20px;
            position: relative; z-index: 10; min-height: 80px;
        }
        .logo-container {
            position: absolute; left: 50%; top: 50%;
            transform: translate(-50%, -50%);
        }
        .logo-container img { height: 90px; display: block; }

        .nav-right { display: flex; align-items: center; gap: 20px; z-index: 15; }
        .ig-link { font-size: 1.5em; color: #fff; }

        .hamburger-menu {
            background: none; border: none; cursor: pointer;
            display: flex; flex-direction: column; gap: 6px; width: 30px; z-index: 15;
        }
        .hamburger-menu .line {
            width: 30px; height: 3px; background-color: #fff; border-radius: 5px; transition: all 0.3s ease;
        }

        /* MENU LATERALE (Uniformato a index.html) */
        .menu-pop-up {
            position: fixed; top: 0; left: -300px; width: 280px; height: 100%;
            background-color: rgba(0, 0, 0, 0.95); padding-top: 80px;
            transition: left 0.3s ease-in-out; z-index: 14; display: flex; flex-direction: column;
        }
        .menu-pop-up.open { left: 0; }
        .menu-pop-up a { padding: 12px 25px; font-size: 1.1em; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .menu-pop-up a.sub-menu {
            padding-left: 45px; font-size: 0.95em; color: #e0ac4c; border-bottom: none; opacity: 0.8;
            display: flex; align-items: center; gap: 8px;
        }
        .close-menu { position: absolute; top: 25px; right: 25px; font-size: 2.5em; cursor: pointer; }
        
        .flag-icon {
            width: 20px; height: auto; vertical-align: middle;
            margin-left: 5px; border-radius: 2px;
        }

        /* CONTENUTO CENTRALE 404 */
        .content {
            flex: 1; display: flex; justify-content: center; align-items: center;
            padding: 40px 20px; text-align: center;
        }

        .error-404-container {
            max-width: 600px; background-color: rgba(0, 0, 0, 0.5);
            padding: 40px; border-radius: 20px; display: flex; flex-direction: column;
            align-items: center; gap: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
        }

        /* IMMAGINE RICHIESTA PAGE-BEER-NOT-FOUND */
        .beer-not-found-img {
            max-width: 100%; height: auto; border-radius: 10px;
            /* Se vuoi un'ombra o un effetto particolare, aggiungilo qui */
        }

        .error-title { font-size: 2.8em; color: #e0ac4c; font-weight: bold; margin: 10px 0; }
        .error-text { font-size: 1.3em; line-height: 1.6; margin-bottom: 20px; }

        /* PULSANTE TORNA ALLA HOME */
        .home-button {
            background-color: #e0ac4c; color: #000; padding: 15px 30px;
            font-size: 1.2em; font-weight: bold; border-radius: 50px;
            transition: background-color 0.3s ease, transform 0.1s;
        }
        .home-button:hover { background-color: #c4913e; transform: scale(1.05); opacity: 1; }

        /* FOOTER */
        .footer { background-color: rgba(0, 0, 0, 0.8); text-align: center; padding: 25px; font-size: 0.9em; margin-top: auto; }

        @media screen and (max-width: 800px) {
            .logo-container img { height: 65px; }
            .error-title { font-size: 2.2em; }
            .error-text { font-size: 1.1em; }
            .home-button { font-size: 1.1em; padding: 12px 25px; }
        }
    </style>
</head>
<body>
    <div class="overlay">
        <header>
            <button class="hamburger-menu" aria-label="Menu">
                <span class="line"></span><span class="line"></span><span class="line"></span>
            </button>
            <div class="logo-container">
                <a href="index.html"><img src="Logo-IBS-italian-beer-school-firenze.png" alt="Logo IBS" /></a>
            </div>
            <div class="nav-right">
                <a href="https://www.instagram.com/italianbeerschool/?hl=en" target="_blank" class="ig-link">
                    <i class="fab fa-instagram"></i>
                </a>
            </div>
        </header>

        <nav class="menu-pop-up">
            <div class="close-menu">&times;</div>
            <a href="index.html">HOME</a>
            <a href="tutti-i-corsidibirra.html">CORSI DI BIRRA</a>
            <a href="corso-base-firenze.html" class="sub-menu">• CORSO BASE <img src="https://flagcdn.com/it.svg" class="flag-icon" alt="IT"></a>
            <a href="corso-secondo-livello-birra-firenze.html" class="sub-menu">• CORSO AVANZATO <img src="https://flagcdn.com/it.svg" class="flag-icon" alt="IT"></a>
            <a href="curiosita-birra.html">LO SAPEVI CHE?</a>
            <a href="quizdibirra.html">QUIZ</a>
            <a href="degustazioni-passate.html">DEGUSTAZIONI PASSATE</a>
            <a href="bio.html">CHI SONO</a>
            <a href="contatti.html">CONTATTI</a>
        </nav>

        <main class="content">
            <div class="error-404-container">
                <img src="page-beer-not-found.webp" alt="Ops! Nessuna birra trovata" class="beer-not-found-img" />
                
                <h1 class="error-title">Oops! </h1>
                <p class="error-text">La pagina che stavi cercando è ancora in fase di fermentazione.</p>
                
                <a href="index.html" class="home-button">Torna alla Home</a>
            </div>
        </main>

        <footer class="footer">
            2025 IBS ITALIAN BEER SCHOOL – P.IVA: IT07436420488 | <a href="privacy.html" style="color:#e0ac4c">Privacy</a>
        </footer>
    </div>

    <script>
        const hb = document.querySelector('.hamburger-menu'), 
              menu = document.querySelector('.menu-pop-up'), 
              close = document.querySelector('.close-menu');
        
        function toggle() { 
            menu.classList.toggle('open'); 
        }
        
        hb.onclick = toggle; 
        close.onclick = toggle;
    </script>
</body>
</html>
