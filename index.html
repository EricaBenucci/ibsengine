<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Italian Beer School - Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Quicksand', sans-serif;
            background: url('sfondobichiere.jpg') no-repeat center center fixed;
            background-size: cover; background-color: #1a1a1a; color: #ffffff;
        }
        .wrapper {
            min-height: 100vh; display: flex; flex-direction: column;
            background-color: rgba(0, 0, 0, 0.6);
        }
        header {
            height: 90px; background-color: rgba(0, 0, 0, 0.85);
            display: flex; align-items: center; padding: 0 20px;
            position: relative; border: none;
        }
        .logo-container {
            position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
        }
        .logo-container img {
            height: 75px; border-radius: 50%; display: block;
        }
        .nav-toggle {
            cursor: pointer; z-index: 1000; background: none; border: none; padding: 10px;
        }
        .nav-toggle span {
            display: block; width: 30px; height: 3px; background: #ffffff; margin: 6px 0;
        }
        .side-menu {
            position: fixed; top: 0; left: -280px; width: 280px; height: 100%;
            background-color: #000000; transition: 0.4s; z-index: 999; padding-top: 100px;
        }
        .side-menu.active { left: 0; }
        .side-menu a {
            display: block; padding: 15px 30px; color: #ffffff;
            text-decoration: none; font-size: 1.1rem; border-bottom: 1px solid #222;
        }
        main { flex: 1; display: flex; justify-content: center; align-items: center; padding: 40px 20px; }
        .events-grid { display: flex; flex-wrap: wrap; gap: 50px; justify-content: center; }
        .event-card { text-align: center; max-width: 350px; text-decoration: none; color: inherit; }
        .event-card img {
            width: 300px; height: 300px; border-radius: 50%;
            object-fit: cover; border: none;
        }
        .event-card h2 { color: #e0ac4c; margin: 20px 0 5px 0; font-size: 1.6rem; }
        footer { background-color: rgba(0, 0, 0, 0.9); text-align: center; padding: 25px; font-size: 0.85rem; border: none; }
    </style>
</head>
<body>
<div class="wrapper">
    <header>
        <button class="nav-toggle" onclick="toggleMenu()"><span></span><span></span><span></span></button>
        <div class="logo-container">
            <a href="index.html"><img src="logonew.png" alt="Logo IBS"></a>
        </div>
    </header>
    <nav class="side-menu" id="menu">
        <a href="index.html">HOME</a>
        <a href="bio.html">CHI SONO</a>
        <a href="prossimieventi.html">PROSSIMI EVENTI</a>
        <a href="corsodibirra.html">CORSI DI BIRRA</a>
        <a href="losapeviche.html">LO SAPEVI CHE?</a>
        <a href="degustazionipassate.html">DEGUSTAZIONI PASSATE</a>
        <a href="contatti.html">CONTATTI</a>
    </nav>
    <main>
        <div class="events-grid">
            <a href="iga.html" class="event-card">
                <img src="iga.jpg" alt="Evento IGA">
                <h2>IGA Italian Grape Ale</h2>
                <p>Un Punto d’Incontro tra Malto e Uva<br>10 Giugno</p>
            </a>
            <a href="corsodibirra.html" class="event-card">
                <img src="corsohome.jpg" alt="Corso Birra">
                <h2>Corso di Birra</h2>
                <p>In 4 serate<br>1, 8, 15 e 22 Ottobre 2026</p>
            </a>
        </div>
    </main>
    <footer>© 2025 IBS ITALIAN BEER SCHOOL – P.IVA: IT07436420488</footer>
</div>
<script>
    function toggleMenu() { document.getElementById('menu').classList.toggle('active'); }
</script>
</body>
</html>
